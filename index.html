<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>흑섬 - Black Flash</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  overflow-x: hidden;
  overflow-y: auto;
  font-family: sans-serif;
}

.game-section {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
  background: #000;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}

/* 화면 흔들림 효과 */
.game-section.shake {
  animation: screenShake 0.25s;
}

@keyframes screenShake {
  0% { transform: translate(0,0); }
  20% { transform: translate(-4px,2px); }
  40% { transform: translate(4px,-2px); }
  60% { transform: translate(-3px,1px); }
  80% { transform: translate(3px,-1px); }
  100% { transform: translate(0,0); }
}

.bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.bg .layer {
  position: absolute;
  inset: 0;
  background-image: url("./bg.png");
  background-repeat: no-repeat;
  background-position: center center;
  background-size: contain;
}

.tolerance-wrap {
  position: absolute;
  left: 50%;
  top: 22px;
  transform: translateX(-50%);
  width: min(720px, 92vw);
  padding: 12px 14px;
  border-radius: 14px;
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(255,255,255,0.14);
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 10px;
  align-items: center;
  z-index: 10;
  color: #fff;
}

.tolerance-wrap input[type="range"] {
  width: 100%;
}

.result-wrap {
  position: absolute;
  left: 50%;
  top: 80px;
  transform: translateX(-50%);
  width: min(720px, 92vw);
  padding: 10px 14px;
  border-radius: 14px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,0,0,0.4);
  color: #ff4d4d;
  font-size: 14px;
  z-index: 10;
  display: none;
}

/* [수정 포인트] 슬라이더 테두리: 검붉은색 + 글로우 효과 */
.slider-shell {
  position: absolute;
  left: 50%;
  bottom: 50px;
  transform: translateX(-50%);
  width: min(600px, 90vw);
  height: 18px;
  border-radius: 999px;
  background: rgba(0,0,0,0.8);
  
  /* 검붉은색 테두리와 살짝 빛나는 효과 */
  border: 2px solid #4a0000; 
  box-shadow: 0 0 15px rgba(139, 0, 0, 0.6), inset 0 0 10px rgba(139, 0, 0, 0.4);
  
  overflow: hidden;
  z-index: 10;
}

.slider-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #660000, #ff0000);
  box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
}

.flash {
  position: absolute;
  inset: 0;
  background: rgba(255,0,0,0.35);
  opacity: 0;
  pointer-events: none;
  transition: opacity 80ms linear;
  z-index: 20;
}

.flash-black {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.95); /* 더 깊은 어둠 */
  opacity: 0;
  pointer-events: none;
  transition: opacity 80ms linear;
  z-index: 21;
}

.flash.on,
.flash-black.on {
  opacity: 1;
}

.info-section {
  background: #ffffff;
  color: #333;
  padding: 60px 20px;
  text-align: center;
  box-sizing: border-box;
}

.info-section h2 {
  margin: 0 0 10px 0;
  font-size: 20px;
  color: #000;
}

.info-section p {
  margin: 0;
  font-size: 16px;
  color: #555;
}

.info-section a {
  color: #ff2a2a;
  text-decoration: none;
  font-weight: bold;
}

.info-section a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="game-section" id="gameSection">
  <div class="bg">
    <div class="layer"></div>
  </div>

  <div class="tolerance-wrap">
    <div>허용오차</div>
    <input id="tol" type="range" min="0.001" max="0.1" step="0.001" value="0.01">
    <div><span id="tolOut">0.010</span> s</div>
  </div>

  <div class="result-wrap" id="result"></div>

  <div class="slider-shell" id="gameArea">
    <div class="slider-fill" id="fill"></div>
  </div>

  <div class="flash" id="flash"></div>
  <div class="flash-black" id="flashBlack"></div>
</div>

<div class="info-section">
  <h2>Contact Info</h2>
  <p>문의사항이나 피드백이 있다면 아래 이메일로 연락해주세요.</p>
  <p style="margin-top: 15px;">이메일: <a href="mailto:toastguy8@gmail.com">toastguy8@gmail.com</a></p>
</div>

<script>
const fill = document.getElementById("fill");
const flash = document.getElementById("flash");
const flashBlack = document.getElementById("flashBlack");
const gameSection = document.getElementById("gameSection");

const tolInput = document.getElementById("tol");
const tolOut = document.getElementById("tolOut");
const gameArea = document.getElementById("gameArea");
const result = document.getElementById("result");

let tolerance = parseFloat(tolInput.value);
tolOut.textContent = tolerance.toFixed(3);

tolInput.addEventListener("input", () => {
  tolerance = parseFloat(tolInput.value);
  tolOut.textContent = tolerance.toFixed(3);
});

const TARGET_S = 1;
let running = false;
let startPerf = 0;
let raf = null;

let audioCtx;
let successBuffer;

async function initAudio(){
  if(successBuffer) return;
  audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === "suspended"){
    await audioCtx.resume();
  }
  const res = await fetch("gokuSen.mp3",{cache:"force-cache"});
  const array = await res.arrayBuffer();
  successBuffer = await audioCtx.decodeAudioData(array);
}

function playSound(){
  if(!successBuffer) return;
  const src = audioCtx.createBufferSource();
  src.buffer = successBuffer;
  src.connect(audioCtx.destination);
  src.start(0);
}

function loop(){
  const elapsed = (performance.now() - startPerf) / 1000; 
  const progress = Math.min(elapsed / TARGET_S, 1);
  fill.style.width = (progress * 100) + "%";
  if (running) raf = requestAnimationFrame(loop);
}

function start(){
  running = true;
  startPerf = performance.now();
  fill.style.width = "0%";
  result.style.display = "none";
  raf = requestAnimationFrame(loop);
}

function stop(){
  running = false;
  if (raf) cancelAnimationFrame(raf);

  const elapsed = (performance.now() - startPerf) / 1000;
  const progress = Math.min(elapsed / TARGET_S, 1);
  fill.style.width = (progress * 100) + "%";

  const diff = elapsed - TARGET_S;
  const absDiff = Math.abs(diff);

  if (absDiff <= tolerance){
    success();
  } else {
    const direction = diff > 0 ? "늦음" : "빠름";
    result.innerHTML = `실패 ${absDiff.toFixed(3)} s ${direction}`;
    result.style.display = "block";
  }
}

function success(){
  gameSection.classList.add("shake");

  if(tolerance <= 0.001){
    flashBlack.classList.add("on");
    setTimeout(()=>{
      flashBlack.classList.remove("on");
      gameSection.classList.remove("shake");
      fill.style.width = "0%";
    },400);
  } 
  else {
    flash.classList.add("on");
    setTimeout(()=>{
      flash.classList.remove("on");
      gameSection.classList.remove("shake");
      fill.style.width = "0%";
    },400);
  }
  playSound();
}

function toggle(){
  if(!running) start();
  else stop();
}

document.addEventListener("keydown",(e)=>{
  if(e.code==="Space"){
    e.preventDefault(); 
    initAudio();
    toggle();
  }
});

gameArea.addEventListener("pointerdown",(e)=>{
  e.preventDefault();
  initAudio();
  toggle();
});
</script>

</body>
</html>
