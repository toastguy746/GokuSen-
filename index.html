<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>흑섬</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  background: #000;
}

body {
  min-height: 100vh;
  overflow: hidden;
  background: #000;
  touch-action: auto;
  -webkit-user-select: none;
  user-select: none;
}

/* 화면 쉐이크 */
body.shake {
  animation: screenShake 0.25s;
}

@keyframes screenShake {
  0% { transform: translate(0,0); }
  20% { transform: translate(-4px,2px); }
  40% { transform: translate(4px,-2px); }
  60% { transform: translate(-3px,1px); }
  80% { transform: translate(3px,-1px); }
  100% { transform: translate(0,0); }
}

/* 배경 */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.bg .layer {
  position: absolute;
  inset: 0;
  background-image: url("./bg.png");
  background-repeat: no-repeat;
  background-position: center center;
  background-size: contain;
}

/* 허용오차 */
.tolerance-wrap {
  position: fixed;
  left: 50%;
  top: 22px;
  transform: translateX(-50%);
  width: min(720px, 92vw);
  padding: 12px 14px;
  border-radius: 14px;
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(255,255,255,0.14);
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 10px;
  align-items: center;
  z-index: 10;
  color: #fff;
}

.tolerance-wrap input[type="range"] {
  width: 100%;
}

#tolOut {
  color: #fff;
}

/* 결과창 */
.result-wrap {
  position: fixed;
  left: 50%;
  top: 80px;
  transform: translateX(-50%);
  width: min(720px, 92vw);
  padding: 10px 14px;
  border-radius: 14px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,0,0,0.4);
  color: #ff4d4d;
  font-size: 14px;
  z-index: 10;
  display: none;
}

/* 타이머 바 */
.slider-shell {
  position: fixed;
  left: 50%;
  bottom: 50px;
  transform: translateX(-50%);
  width: min(600px, 90vw);
  height: 18px;
  border-radius: 999px;
  background: rgba(0,0,0,0.65);
  border: 1px solid rgba(255,255,255,0.15);
  overflow: hidden;
  touch-action: manipulation;
  z-index: 10;
}

.slider-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff2a2a, #ff0000);
}

.flash {
  position: fixed;
  inset: 0;
  background: rgba(255,0,0,0.35);
  opacity: 0;
  pointer-events: none;
  transition: opacity 80ms linear;
  z-index: 20;
}

.flash.on { opacity: 1; }
</style>
</head>

<body>

<div class="bg">
  <div class="layer"></div>
</div>

<div class="tolerance-wrap">
  <div>허용오차</div>
  <input id="tol" type="range" min="0.1" max="100" step="0.1" value="10">
  <div><span id="tolOut">10.0</span> ms</div>
</div>

<div class="result-wrap" id="result"></div>

<div class="slider-shell" id="gameArea">
  <div class="slider-fill" id="fill"></div>
</div>

<div class="flash" id="flash"></div>

<script>
const fill = document.getElementById("fill");
const flash = document.getElementById("flash");
const tolInput = document.getElementById("tol");
const tolOut = document.getElementById("tolOut");
const gameArea = document.getElementById("gameArea");
const result = document.getElementById("result");

let toleranceMs = parseFloat(tolInput.value);
tolOut.textContent = toleranceMs.toFixed(1);

tolInput.addEventListener("input", () => {
  toleranceMs = parseFloat(tolInput.value);
  tolOut.textContent = toleranceMs.toFixed(1);
});

const TARGET_MS = 1000;
let running = false;
let startPerf = 0;
let raf = null;

/* WebAudio */
let audioCtx;
let successBuffer;

async function initAudio(){
  if(successBuffer) return;

  audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();

  if(audioCtx.state === "suspended"){
    await audioCtx.resume();
  }

  const res = await fetch("gokuSen.mp3",{cache:"force-cache"});
  const array = await res.arrayBuffer();
  successBuffer = await audioCtx.decodeAudioData(array);
}

function playSound(){
  if(!successBuffer) return;

  const src = audioCtx.createBufferSource();
  src.buffer = successBuffer;
  src.connect(audioCtx.destination);
  src.start(0);
}

function loop(){
  const elapsed = performance.now() - startPerf;
  const progress = Math.min(elapsed / TARGET_MS, 1);
  fill.style.width = (progress * 100) + "%";
  if (running) raf = requestAnimationFrame(loop);
}

function start(){
  running = true;
  startPerf = performance.now();
  fill.style.width = "0%";
  result.style.display = "none";
  raf = requestAnimationFrame(loop);
}

function stop(){
  running = false;
  if (raf) cancelAnimationFrame(raf);

  const elapsed = performance.now() - startPerf;
  const progress = Math.min(elapsed / TARGET_MS, 1);
  fill.style.width = (progress * 100) + "%";

  const diff = elapsed - TARGET_MS;
  const absDiff = Math.abs(diff);

  if (absDiff <= toleranceMs){
    success();
  } else {
    const direction = diff > 0 ? "늦음" : "빠름";
    result.innerHTML = `실패 ❌ ${absDiff.toFixed(1)} ms ${direction}`;
    result.style.display = "block";
  }
}

function success(){

  document.body.classList.add("shake");
  flash.classList.add("on");

  playSound();

  setTimeout(()=>{
    flash.classList.remove("on");
    document.body.classList.remove("shake");
    fill.style.width = "0%";
  },400);
}

function toggle(){
  if(!running) start();
  else stop();
}

document.addEventListener("keydown",(e)=>{
  if(e.code==="Space"){
    e.preventDefault();
    initAudio();
    toggle();
  }
});

gameArea.addEventListener("pointerdown",(e)=>{
  e.preventDefault();
  initAudio();
  toggle();
});
</script>

</body>
</html>
