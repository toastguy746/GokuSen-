<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>흑섬</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  background: #000;
}

body {
  min-height: 100vh;
  overflow: hidden;
  background: #000;
  touch-action: auto;
  -webkit-user-select: none;
  user-select: none;
}

body.shake {
  animation: screenShake 0.25s;
}

@keyframes screenShake {
  0% { transform: translate(0,0); }
  20% { transform: translate(-4px,2px); }
  40% { transform: translate(4px,-2px); }
  60% { transform: translate(-3px,1px); }
  80% { transform: translate(3px,-1px); }
  100% { transform: translate(0,0); }
}

.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.bg .layer {
  position: absolute;
  inset: 0;
  background-image: url("./bg.png");
  background-repeat: no-repeat;
  background-position: center center;
  background-size: contain;
}

.tolerance-wrap {
  position: fixed;
  left: 50%;
  top: 22px;
  transform: translateX(-50%);
  width: min(720px, 92vw);
  padding: 12px 14px;
  border-radius: 14px;
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(255,255,255,0.14);
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 10px;
  align-items: center;
  z-index: 10;
  color: #fff;
}

.tolerance-wrap input[type="range"] {
  width: 100%;
}

.result-wrap {
  position: fixed;
  left: 50%;
  top: 80px;
  transform: translateX(-50%);
  width: min(720px, 92vw);
  padding: 10px 14px;
  border-radius: 14px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,0,0,0.4);
  color: #ff4d4d;
  font-size: 14px;
  z-index: 10;
  display: none;
}

.slider-shell {
  position: fixed;
  left: 50%;
  bottom: 50px;
  transform: translateX(-50%);
  width: min(600px, 90vw);
  height: 18px;
  border-radius: 999px;
  background: rgba(0,0,0,0.65);
  border: 1px solid rgba(255,255,255,0.15);
  overflow: hidden;
  touch-action: manipulation;
  z-index: 10;
}

.slider-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff2a2a, #ff0000);
}

.flash {
  position: fixed;
  inset: 0;
  background: rgba(255,0,0,0.35);
  opacity: 0;
  pointer-events: none;
  transition: opacity 80ms linear;
  z-index: 20;
}

.flash-black {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  opacity: 0;
  pointer-events: none;
  transition: opacity 80ms linear;
  z-index: 21;
}

.flash.on,
.flash-black.on {
  opacity: 1;
}

.lang-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 8px 12px;
  border-radius: 10px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  font-size: 13px;
  cursor: pointer;
  z-index: 30;
}
</style>
</head>

<body>

<div class="bg">
  <div class="layer"></div>
</div>

<div class="lang-toggle" id="langToggle">한국어 ∨</div>

<div class="tolerance-wrap">
  <div id="tolLabel">허용오차</div>
  <input id="tol" type="range" min="0.001" max="0.1" step="0.001" value="0.01">
  <div><span id="tolOut">0.010</span> s</div>
</div>

<div class="result-wrap" id="result"></div>

<div class="slider-shell" id="gameArea">
  <div class="slider-fill" id="fill"></div>
</div>

<div class="flash" id="flash"></div>
<div class="flash-black" id="flashBlack"></div>

<script>
const fill = document.getElementById("fill");
const flash = document.getElementById("flash");
const flashBlack = document.getElementById("flashBlack");

const tolInput = document.getElementById("tol");
const tolOut = document.getElementById("tolOut");
const tolLabel = document.getElementById("tolLabel");
const gameArea = document.getElementById("gameArea");
const result = document.getElementById("result");

const langToggle = document.getElementById("langToggle");

let lang = "ko";

// 추가된 변수
let lastDiff = null;
let lastDirection = null;

const textMap = {
  ko: {
    tolerance: "허용오차",
    fail: "실패",
    late: "늦음",
    early: "빠름",
    langText: "한국어 ∨"
  },
  en: {
    tolerance: "Tolerance",
    fail: "Fail",
    late: "Late",
    early: "Early",
    langText: "English ∨"
  }
};

function updateLanguage(){
  tolLabel.textContent = textMap[lang].tolerance;
  langToggle.textContent = textMap[lang].langText;

  if(lastDiff !== null){
    const direction = lastDirection === "late"
      ? textMap[lang].late
      : textMap[lang].early;

    result.innerHTML =
      `${textMap[lang].fail} ${lastDiff.toFixed(3)} s ${direction}`;
  }
}

langToggle.addEventListener("click", () => {
  lang = (lang === "ko") ? "en" : "ko";
  updateLanguage();
});

let tolerance = parseFloat(tolInput.value);
tolOut.textContent = tolerance.toFixed(3);

tolInput.addEventListener("input", () => {
  tolerance = parseFloat(tolInput.value);
  tolOut.textContent = tolerance.toFixed(3);
});

const TARGET_S = 1;
let running = false;
let startPerf = 0;
let raf = null;

let audioCtx;
let successBuffer;

async function initAudio(){
  if(successBuffer) return;
  audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === "suspended"){
    await audioCtx.resume();
  }
  const res = await fetch("gokuSen.mp3",{cache:"force-cache"});
  const array = await res.arrayBuffer();
  successBuffer = await audioCtx.decodeAudioData(array);
}

function playSound(){
  if(!successBuffer) return;
  const src = audioCtx.createBufferSource();
  src.buffer = successBuffer;
  src.connect(audioCtx.destination);
  src.start(0);
}

function loop(){
  const elapsed = (performance.now() - startPerf) / 1000;
  const progress = Math.min(elapsed / TARGET_S, 1);
  fill.style.width = (progress * 100) + "%";
  if (running) raf = requestAnimationFrame(loop);
}

function start(){
  running = true;
  startPerf = performance.now();
  fill.style.width = "0%";
  result.style.display = "none";
  raf = requestAnimationFrame(loop);
}

function stop(){
  running = false;
  if (raf) cancelAnimationFrame(raf);

  const elapsed = (performance.now() - startPerf) / 1000;
  const progress = Math.min(elapsed / TARGET_S, 1);
  fill.style.width = (progress * 100) + "%";

  const diff = elapsed - TARGET_S;
  const absDiff = Math.abs(diff);

  if (absDiff <= tolerance){
    success();
  } else {

    // 여기 추가됨
    lastDiff = absDiff;
    lastDirection = diff > 0 ? "late" : "early";

    const direction = lastDirection === "late"
      ? textMap[lang].late
      : textMap[lang].early;

    result.innerHTML =
      `${textMap[lang].fail} ${lastDiff.toFixed(3)} s ${direction}`;
    result.style.display = "block";
  }
}

function success(){
  document.body.classList.add("shake");

  if(tolerance <= 0.001){
    flashBlack.classList.add("on");
    setTimeout(()=>{
      flashBlack.classList.remove("on");
      document.body.classList.remove("shake");
      fill.style.width = "0%";
    },400);
  } 
  else {
    flash.classList.add("on");
    setTimeout(()=>{
      flash.classList.remove("on");
      document.body.classList.remove("shake");
      fill.style.width = "0%";
    },400);
  }

  playSound();
}

function toggle(){
  if(!running) start();
  else stop();
}

document.addEventListener("keydown",(e)=>{
  if(e.code==="Space"){
    e.preventDefault();
    initAudio();
    toggle();
  }
});

gameArea.addEventListener("pointerdown",(e)=>{
  e.preventDefault();
  initAudio();
  toggle();
});
</script>

</body>
</html>
