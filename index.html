<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>흑섬 타이밍</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  background: #000;
}

body {
  min-height: 100vh;
  overflow: hidden;
  background-image: url("./bg.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  /* 전체 화면에서 range 슬라이더 터치 막지 않게 auto */
  touch-action: auto;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}

/* ===== 상단 허용오차 슬라이더 ===== */
.tolerance-wrap {
  position: fixed;
  left: 50%;
  top: 22px;
  transform: translateX(-50%);
  width: min(720px, 92vw);
  padding: 12px 14px;
  border-radius: 14px;
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(255,255,255,0.14);
  box-shadow: 0 10px 25px rgba(0,0,0,0.45);
  backdrop-filter: blur(3px);
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 10px;
  align-items: center;
  z-index: 10;
}

.tolerance-wrap input[type="range"] {
  width: 100%;
}

/* ===== 하단 타이머 바 ===== */
.slider-shell {
  position: fixed;
  left: 50%;
  bottom: 50px;
  transform: translateX(-50%);
  width: min(600px, 90vw);
  height: 18px;
  border-radius: 999px;
  background: rgba(0,0,0,0.65);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  overflow: hidden;

  /* 게임 영역에서만 제스처 최소화 */
  touch-action: manipulation;
  z-index: 5;
}

.slider-shell.locked {
  pointer-events: none; /* 성공 사운드 나오는 동안 타이머바만 잠금 */
}

.slider-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff2a2a, #ff0000);
}

/* 성공 섬광 */
.flash {
  position: fixed;
  inset: 0;
  background: rgba(255, 0, 0, 0.35);
  opacity: 0;
  pointer-events: none;
  transition: opacity 80ms linear;
  z-index: 20;
}

.flash.on {
  opacity: 1;
}
</style>
</head>

<body>

<div class="tolerance-wrap">
  <div>허용오차</div>
  <input id="tol" type="range" min="0.1" max="100" step="0.1" value="10">
  <div><span id="tolOut">10.0</span> ms</div>
</div>

<div class="slider-shell" id="gameArea">
  <div class="slider-fill" id="fill"></div>
</div>

<div class="flash" id="flash"></div>

<audio id="successSound" src="gokuSen.mp3" preload="auto"></audio>

<script>
const fill = document.getElementById("fill");
const flash = document.getElementById("flash");
const sound = document.getElementById("successSound");
const tolInput = document.getElementById("tol");
const tolOut = document.getElementById("tolOut");
const gameArea = document.getElementById("gameArea");

let toleranceMs = parseFloat(tolInput.value);
tolOut.textContent = toleranceMs.toFixed(1);

tolInput.addEventListener("input", () => {
  toleranceMs = parseFloat(tolInput.value);
  tolOut.textContent = toleranceMs.toFixed(1);
});

const TARGET_MS = 1000;   // 목표 1초
const FADE_MS = 700;      // 페이드아웃 길이
const TICK_MS = 20;

let running = false;
let startPerf = 0;
let locked = false;
let raf = null;

function loop() {
  const elapsed = performance.now() - startPerf;
  const progress = Math.min(elapsed / TARGET_MS, 1);
  fill.style.width = (progress * 100) + "%";
  if (running) raf = requestAnimationFrame(loop);
}

function start() {
  running = true;
  startPerf = performance.now();
  raf = requestAnimationFrame(loop);
}

function stop() {
  running = false;
  if (raf) cancelAnimationFrame(raf);

  const elapsed = performance.now() - startPerf;
  const diff = Math.abs(elapsed - TARGET_MS);
  if (diff <= toleranceMs) success();
}

function resetBar() {
  fill.style.width = "0%";
  startPerf = 0;
}

function lockGameArea() {
  locked = true;
  gameArea.classList.add("locked");
}

function unlockGameArea() {
  locked = false;
  gameArea.classList.remove("locked");
}

function unlockAndReset() {
  unlockGameArea();
  resetBar();
}

function flashOn() {
  flash.classList.add("on");
  setTimeout(() => flash.classList.remove("on"), 120);
}

let fadeTimer = null;
let fadeInterval = null;

function clearFadeTimers() {
  if (fadeTimer) clearTimeout(fadeTimer);
  if (fadeInterval) clearInterval(fadeInterval);
  fadeTimer = null;
  fadeInterval = null;
}

function startFadeOut() {
  clearFadeTimers();

  const steps = Math.max(1, Math.floor(FADE_MS / TICK_MS));
  const dec = 1 / steps;

  fadeInterval = setInterval(() => {
    sound.volume = Math.max(0, sound.volume - dec);
    if (sound.volume <= 0.001) {
      clearFadeTimers();
      sound.pause();
      sound.volume = 1;
      unlockAndReset();
    }
  }, TICK_MS);
}

function scheduleFadeNearEnd() {
  if (!Number.isFinite(sound.duration) || sound.duration <= 0) {
    sound.addEventListener("loadedmetadata", scheduleFadeNearEnd, { once: true });
    return;
  }

  const durationMs = sound.duration * 1000;
  const startFadeAt = Math.max(0, durationMs - FADE_MS);

  clearFadeTimers();
  fadeTimer = setTimeout(startFadeOut, startFadeAt);
}

function success() {
  lockGameArea();
  flashOn();

  clearFadeTimers();
  sound.pause();
  sound.currentTime = 0;
  sound.volume = 1;

  // 끝나면 무조건 풀기+초기화 (영구락 방지)
  sound.onended = () => {
    clearFadeTimers();
    sound.volume = 1;
    unlockAndReset();
  };

  const p = sound.play();

  if (p && typeof p.then === "function") {
    p.then(scheduleFadeNearEnd).catch(() => {
      // 재생 실패 시(정책/파일문제) 바로 복구
      unlockAndReset();
    });
  } else {
    scheduleFadeNearEnd();
  }
}

/* ===== 입력 통합 ===== */
function toggle() {
  if (locked) return;
  if (!running) start();
  else stop();
}

/* 키보드 Space (PC) */
document.addEventListener("keydown", (e) => {
  if (e.code !== "Space") return;
  e.preventDefault();
  toggle();
});

/* 모바일: 게임 바(아래 타이머바) 터치로만 토글 (슬라이더 터치 방해 X) */
gameArea.addEventListener("touchstart", (e) => {
  e.preventDefault();
  toggle();
}, { passive: false });

/* PC: 게임 바 클릭으로도 토글 */
gameArea.addEventListener("mousedown", () => {
  toggle();
});

/* 모바일: 첫 터치에서 오디오 준비(안전장치) */
document.addEventListener("touchstart", () => {
  sound.load();
}, { once: true, passive: true });
</script>

</body>
</html>
